name: '🚀 Publish'

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: https://npm.pkg.github.com
  NODE_VERSION: '24.14.1'

jobs:
  test:
    name: 🧪 Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          registry-url: ${{ env.REGISTRY }}
          scope: '@canvasflow'

      - run: npm ci

      - name: 🧹 Lint
        run: npm run lint

      - name: 🚜 Build
        run: npm run build

      - name: 📊 Coverage
        id: coverage
        run: npm run coverage

      - name: 📝 Coverage summary
        if: matrix.node == 24
        run: node scripts/coverage-summary.mjs >> "$GITHUB_STEP_SUMMARY"

  release:
    name: 🚀 Publish
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.REGISTRY }}
          scope: '@canvasflow'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npm ci

      - name: 🚜 Build
        run: npm run build

      - name: 📦 Pack
        run: npm pack --dry-run

      - name: 🚀 Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Wiki sync — runs on v* tags or manual dispatch, independent of
  # the test/release jobs.
  # ──────────────────────────────────────────────────────────────
  wiki-sync:
    name: 📚 Sync Wiki
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.sync.outputs.changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Sync docs/wiki → GitHub Wiki
        id: sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TMP="$(mktemp -d)"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Clone the existing wiki; if it has never been initialized, start fresh.
          # (The repo's Wiki feature must be enabled in Settings → Features → Wikis.)
          if git clone "$REMOTE" "$TMP" 2>/dev/null; then
              echo "Cloned existing wiki."
          else
              echo "Wiki not initialized yet; creating it from scratch."
              git -C "$TMP" init -q
              git -C "$TMP" remote add origin "$REMOTE"
          fi

          # Mirror docs/wiki into the wiki root, deleting pages removed from
          # the source. Keep the wiki repo's own .git intact.
          rsync -a --delete --exclude='.git' "${GITHUB_WORKSPACE}/docs/wiki/" "$TMP/"

          # GitHub wiki serves the raw file (instead of navigating) when an
          # internal link keeps its .md extension. Strip .md only from links to
          # sibling wiki pages — i.e. a bare PageName(.md)(#anchor) with no slash
          # or scheme — leaving repo-relative (../../…md) and absolute
          # (https://…md) links untouched.
          find "$TMP" -name '*.md' -type f -print0 \
              | xargs -0 perl -0pi -e 's/\]\(([^()\/:#]+)\.md(#[^)]*)?\)/](\1\2)/g'

          cd "$TMP"
          git add -A
          if git diff --cached --quiet; then
              echo "Wiki already up to date; nothing to push."
              echo "changed=false" >> "$GITHUB_OUTPUT"
              exit 0
          fi

          git commit -q -m "docs: sync wiki from ${GITHUB_REF_NAME} (${GITHUB_SHA:0:7})"
          # GitHub wiki repositories use the 'master' branch.
          git branch -M master
          git push -u origin master
          echo "Wiki synced from docs/wiki."
          echo "changed=true" >> "$GITHUB_OUTPUT"
